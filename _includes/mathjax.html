{% if page.mathjax %}
  <!-- MathJax Configuration -->
  <script type="text/javascript">
    window.MathJax = {
      tex: {
        // Inline math delimiters: $...$ and \( ... \)
        inlineMath: [['$', '$'], ['\\(', '\\)']],
        // Display math delimiters: $$...$$ and \[ ... \]
        displayMath: [['$$', '$$'], ['\\[', '\\]']]
      },
      svg: {
        fontCache: 'global'
      }
    };
  </script>
  <!-- MathJax Loader -->
  <script async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js"></script>
{% endif %}
